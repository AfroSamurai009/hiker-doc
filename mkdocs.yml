site_name: HikerAPI Documentation
site_url: https://hikerapi.readthedocs.io/
site_description: Instagram Data API — profiles, posts, stories, reels, comments, followers, hashtags, locations

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - announce.dismiss
  icon:
    logo: material/api

plugins:
  - search
  - swagger-ui-tag:
      docExpansion: list
      syntaxHighlightTheme: monokai
      tryItOutEnabled: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Authentication: getting-started/authentication.md
  - API Reference:
    - REST API v1: api-reference/rest-v1.md
    - REST API v2: api-reference/rest-v2.md
    - GraphQL API: api-reference/graphql.md
    - Response Codes: api-reference/response-codes.md
  - SDKs:
    - Python: sdk/python.md
    - JavaScript: sdk/javascript.md
    - Go: sdk/go.md
    - PHP: sdk/php.md
  - Guides:
    - Rate Limits: guides/rate-limits.md
    - Request Costs: guides/request-costs.md

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/hikerapi
  generator: false

extra_css:
  - overrides/extra.css
